<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CapWorks</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
height:100vh;
overflow:hidden;
background:#050816;
display:flex;
justify-content:center;
align-items:center;
position:relative;
}

/* Fond animé */
body::before{
content:"";
position:absolute;
width:200%;
height:200%;
background:
radial-gradient(circle at 20% 30%, #00ffff22, transparent 20%),
radial-gradient(circle at 80% 70%, #ff00ff22, transparent 20%),
radial-gradient(circle at 50% 50%, #0066ff22, transparent 30%);
animation:bgMove 15s linear infinite;
}

@keyframes bgMove{
from{transform:rotate(0deg);}
to{transform:rotate(360deg);}
}

/* Lignes néon */
.line{
position:absolute;
width:2px;
height:250px;
background:linear-gradient(transparent,#00ffff,transparent);
filter:blur(1px);
animation:fall linear infinite;
}

@keyframes fall{
from{ transform:translateY(-300px); opacity:0; }
30%{ opacity:1; }
to{ transform:translateY(calc(100vh + 300px)); opacity:0; }
}

.container{
position:relative;
z-index:10;
text-align:center;
padding:20px;
}

/* Logo */
.logo{
font-size:7rem;
font-weight:900;
letter-spacing:8px;
text-transform:uppercase;

background:linear-gradient(90deg,#00ffff,#00aaff,#ff00ff,#00ffff);
background-size:300% auto;

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

animation: shine 5s linear infinite, float 4s ease-in-out infinite;
}

@keyframes shine{
from{background-position:0% center;}
to{background-position:300% center;}
}

@keyframes float{
0%,100%{ transform:translateY(0px); }
50%{ transform:translateY(-10px); }
}

.subtitle{
color:#b6c5ff;
letter-spacing:6px;
margin-top:15px;
margin-bottom:60px;
font-size:1rem;
}

/* Bouton */
.enter-btn{
position:relative;
display:inline-block;
padding:18px 42px;
color:white;
text-decoration:none;
font-size:1.15rem;
letter-spacing:1px;
border:2px solid #00ffff;
border-radius:60px;
overflow:hidden;
background:rgba(255,255,255,.03);
backdrop-filter:blur(10px);
box-shadow:0 0 15px #00ffff,0 0 35px #00ffff55;
transition:.35s;
cursor:pointer;
}

.enter-btn:hover{
transform:translateY(-4px) scale(1.05);
box-shadow:0 0 25px #00ffff,0 0 60px #00ffff,0 0 100px #00ffff;
}

.enter-btn.disabled{
opacity:.55;
pointer-events:none;
border-color:#666;
color:#888;
box-shadow:none;
}

/* glow */
.glow{
position:absolute;
width:500px;
height:500px;
border-radius:50%;
filter:blur(120px);
z-index:0;
}
.glow1{background:#00ffff15; left:-150px; top:-150px;}
.glow2{background:#ff00ff15; right:-150px; bottom:-150px;}

/* popup */
.secret{
position:fixed;
top:40px;
left:50%;
transform:translateX(-50%);
background:#0008;
color:#00ffff;
border:1px solid #00ffff;
padding:10px 15px;
border-radius:10px;
display:none;
z-index:9999;
}

/* compteur */
.counter{
position:fixed;
top:15px;
right:15px;
padding:6px 10px;
border:1px solid #00ffff;
color:#00ffff;
border-radius:8px;
display:none;
background:#0006;
font-size:14px;
}
</style>
</head>

<body>

<div class="glow glow1"></div>
<div class="glow glow2"></div>

<div class="container">

<h1 class="logo" id="logo">CAPWORKS</h1>

<div class="subtitle" id="subtitle">
DÉVELOPPEMENT • CRÉATIVITÉ • PASSION
</div>

<a href="home.html" class="enter-btn" id="btn">
Entrer dans l'univers →
</a>

</div>

<div class="counter" id="counter">0 / 15</div>
<div class="secret" id="secret"></div>

<script>

/* ================= CONFIG ================= */
const SITE_OPEN=false;

/* ================= UI ================= */
const btn=document.getElementById("btn");
const counter=document.getElementById("counter");
const secret=document.getElementById("secret");
const logo=document.getElementById("logo");
const subtitle=document.getElementById("subtitle");

/* ================= LIGNES ================= */
for(let i=25;i--;){
let l=document.createElement("div");
l.className="line";
l.style.left=Math.random()*100+"vw";
l.style.animation=`fall ${4+Math.random()*8}s linear ${-Math.random()*10}s infinite`;
document.body.append(l);
}

/* ================= MAINTENANCE ================= */
if(!SITE_OPEN){
const notice=document.createElement("div");
notice.className="maintenance-notice";
notice.innerHTML=`⚠️ Le site est actuellement indisponible.<br>
Nous modernisons actuellement cette page pour vous proposer une expérience encore meilleure. Merci de votre compréhension.`;

btn.removeAttribute("href");
btn.classList.add("disabled");
btn.textContent="Bientôt disponible";

document.querySelector(".container").appendChild(notice);
}

/* ================= EASTER EGGS ================= */
const found=new Set();
const MAX=15;

function unlock(id,msg){
if(found.has(id)) return;

found.add(id);

counter.style.display="block";
counter.textContent=`${found.size} / ${MAX}`;
counter.style.animation="pop .2s";

secret.textContent=msg;
secret.style.display="block";
setTimeout(()=>secret.style.display="none",2000);

if(found.size===MAX){
secret.textContent="MODE SECRET DÉBLOQUÉ";
document.body.style.filter="hue-rotate(180deg)";
}
}

/* 1 triple logo */
let lc=0;
logo.onclick=()=>{
lc++;
if(lc===3) unlock("logo","GLITCH LOGO");
setTimeout(()=>lc=0,800);
};

/* 2 subtitle 7 clics */
let sc=0;
subtitle.onclick=()=>{
sc++;
if(sc===7) unlock("subtitle","MESSAGE CACHÉ");
};

/* 3 CAPWORKS */
let code="";
logo.querySelectorAll("span").forEach(s=>{
s.onclick=()=>{
code+=s.textContent;
if("CAPWORKS".startsWith(code)){
if(code==="CAPWORKS") unlock("capworks","CODE CAPWORKS VALIDÉ");
}else code="";
}
});

/* 4 KONAMI FIX */
let k=[];
let cap="";
const konami=["ArrowUp","ArrowUp","ArrowDown","ArrowDown","ArrowLeft","ArrowRight","ArrowLeft","ArrowRight","b","a"];

window.addEventListener("keydown",e=>{

k.push(e.key);
k=k.slice(-10);

if(JSON.stringify(k)===JSON.stringify(konami)){
unlock("konami","KONAMI ACTIVÉ");
k=[];
}

cap+=e.key.toUpperCase();
if(cap.includes("CAP")) unlock("cap","CODE CAP DÉTECTÉ");
setTimeout(()=>cap="",1200);

});

/* 5 hold button */
let hold;
btn.onmousedown=()=>{
hold=setTimeout(()=>unlock("hold","BOUTON DÉVERROUILLÉ"),2000);
};
btn.onmouseup=()=>clearTimeout(hold);

</script>

</body>
</html>
