<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CapWorks</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
height:100vh;
overflow:hidden;
background:#050816;
display:flex;
justify-content:center;
align-items:center;
perspective:1200px;
}

/* ===== BACKGROUND ===== */
body::before{
content:"";
position:absolute;
width:220%;
height:220%;
background:
radial-gradient(circle at 20% 30%, #00ffff25, transparent 25%),
radial-gradient(circle at 80% 70%, #ff00ff20, transparent 25%),
radial-gradient(circle at 50% 50%, #0066ff25, transparent 35%);
animation:bgMove 18s linear infinite;
}

@keyframes bgMove{
from{transform:rotate(0deg);}
to{transform:rotate(360deg);}
}

/* ===== LIGNES ===== */
.line{
position:absolute;
width:2px;
height:260px;
background:linear-gradient(transparent,#00ffffaa,transparent);
filter:blur(1px);
opacity:.8;
animation:fall linear infinite;
}

@keyframes fall{
from{transform:translateY(-350px);opacity:0;}
20%{opacity:.9;}
to{transform:translateY(calc(100vh + 350px));opacity:0;}
}

/* ===== SCÈNE 3D ===== */
.container{
position:relative;
z-index:10;

display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
gap:18px;

transform-style:preserve-3d;
transition:transform .15s ease-out;
}

/* ===== LOGO (RELIEF GRAVÉ SANS LUMIÈRE) ===== */
.logo{
font-size:7rem;
font-weight:900;
letter-spacing:10px;
display:flex;
gap:2px;
transform-style:preserve-3d;
}

.logo span{
display:inline-block;

/* 🎨 néon vivant (bleu → violet → cyan) */
background:linear-gradient(
90deg,
#00e5ff,
#4da3ff,
#b56bff,
#00e5ff
);
background-size:300% 300%;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

/* 🪨 relief solide (sans glow externe) */
text-shadow:
0 1px 0 #061018,
0 2px 0 #04101a,
0 3px 0 #020a12,
0 4px 0 #02070e,
0 8px 14px rgba(0,0,0,0.55);

/* ✨ animation couleur + flottement */
animation:
neonShift 6s ease-in-out infinite,
float 5s ease-in-out infinite;
}

/* 🎨 mouvement du néon */
@keyframes neonShift{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* 🪶 léger mouvement 3D naturel */
@keyframes float{
0%,100%{transform:translateY(0px);}
50%{transform:translateY(-4px);}
}

@keyframes float{
0%,100%{transform:translateY(0px);}
50%{transform:translateY(-4px);}
}

/* ===== SUBTITLE ===== */
.subtitle{
color:#b6c5ff;
letter-spacing:6px;
font-size:1rem;
opacity:.9;
transform:translateZ(30px);
}

/* ===== BOUTON ===== */
.enter-btn{
position:relative;
display:inline-block;
padding:18px 44px;
color:white;
text-decoration:none;
font-size:1.15rem;
letter-spacing:1px;

border:2px solid #00ffff;
border-radius:999px;

background:rgba(255,255,255,0.03);
backdrop-filter:blur(12px);

box-shadow:
0 0 18px rgba(0,255,255,0.5),
0 0 45px rgba(0,255,255,0.25);

transition:.35s;
transform:translateZ(40px);
}

.enter-btn:hover{
transform:translateZ(60px) translateY(-5px) scale(1.06);
}

/* ===== MAINTENANCE ===== */
.maintenance{
color:#ffd166;
font-size:1rem;
line-height:1.6;
text-shadow:0 0 12px rgba(255,209,102,.9);
animation:pulse 2s ease-in-out infinite;
transform:translateZ(20px);
}

@keyframes pulse{
0%,100%{opacity:.75;}
50%{opacity:1;}
}
</style>
</head>

<body>

<div class="container" id="scene">

<!-- LOGO -->
<div class="logo">
<span>C</span><span>A</span><span>P</span><span>W</span><span>O</span><span>R</span><span>K</span><span>S</span>
</div>

<!-- SUBTITLE -->
<div class="subtitle">
DÉVELOPPEMENT • CRÉATIVITÉ • PASSION
</div>

<!-- BUTTON -->
<a href="home.html" class="enter-btn" id="btn">
Entrer dans l'univers →
</a>

<!-- MAINTENANCE -->
<div class="maintenance" id="maintenance">
⚠️ Le site est actuellement indisponible.<br>
Bientôt disponible →
</div>

</div>

<script>

/* ===========================
MODE GLOBAL
=========================== */
const IS_MAINTENANCE = false;

const btn = document.getElementById("btn");
const maintenance = document.getElementById("maintenance");

/* logique propre */
if(IS_MAINTENANCE){
btn.removeAttribute("href");
btn.textContent = "Bientôt disponible";
maintenance.style.display = "block";
}else{
maintenance.style.display = "none";
}

/* ===========================
LIGNES
=========================== */
for(let i=25;i--;){
const l=document.createElement("div");
l.className="line";
l.style.left=Math.random()*100+"vw";
l.style.animationDuration=(4+Math.random()*8)+"s";
l.style.animationDelay=(-Math.random()*10)+"s";
document.body.appendChild(l);
}

/* ===========================
CAMÉRA 3D SOURIS
=========================== */
const scene=document.getElementById("scene");

document.addEventListener("mousemove",(e)=>{

const x=(e.clientX/window.innerWidth - 0.5)*18;
const y=(e.clientY/window.innerHeight - 0.5)*18;

scene.style.transform=
`rotateY(${x}deg) rotateX(${-y}deg)`;

});

</script>

</body>
</html>
